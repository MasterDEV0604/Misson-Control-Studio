name: qt-sanity

on:
  push:
  pull_request:

jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate repository layout
        run: |
          test -f README.md
          test -f CMakeLists.txt
          test -d assets/scenarios
          test -d docs
          test -d src
